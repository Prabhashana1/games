<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumudu & Sasindi - Pearl Hunt 🦪</title>
    <!-- Cloud MQTT තාක්ෂණය -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --primary: #0984e3; --bg: #ffeaa7; --text: #2d3436; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { background-color: var(--bg); text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }

        /* Setup Screen */
        #setup-screen { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 95%; margin-top: 50px; z-index: 10; position: absolute; }
        h2 { color: var(--primary); margin-bottom: 10px; }
        .id-box { background: #74b9ff; color: white; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 16px; letter-spacing: 1px; margin: 15px 0; word-wrap: break-word; }
        input { padding: 12px; width: 90%; margin: 10px 0; border: 2px solid #74b9ff; border-radius: 10px; font-size: 16px; outline: none; text-align: center; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 90%; box-shadow: 0 5px 15px rgba(9, 132, 227, 0.4); margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }

        /* Game Screen */
        #game-screen { display: none; width: 100%; max-width: 600px; height: 100vh; flex-direction: column; justify-content: space-between; background: linear-gradient(180deg, #81ecec 0%, #74b9ff 100%); position: relative; padding: 20px 0; }
        
        /* Player Zones (Top and Bottom) */
        .player-zone { background: rgba(255,255,255,0.9); padding: 15px 30px; border-radius: 20px; font-weight: bold; font-size: 22px; display: inline-block; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #sasindi-zone { color: #e84393; border-top-left-radius: 0; border-top-right-radius: 0; margin-top: -20px; }
        #sumudu-zone { color: #0984e3; border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: -20px; }

        /* Game Area */
        #play-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }
        
        #round-info { background: #fdcb6e; color: #2d3436; padding: 10px 25px; border-radius: 20px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #msg-info { font-size: 18px; font-weight: bold; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); min-height: 25px; }

        #shells-container { display: flex; justify-content: center; gap: 20px; width: 100%; padding: 0 20px; }
        
        .shell-wrapper { position: relative; width: 90px; height: 90px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .shell-emoji { font-size: 70px; position: absolute; z-index: 2; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pearl-emoji { font-size: 45px; position: absolute; z-index: 1; opacity: 0; transform: translateY(20px); transition: 0.3s; }

        /* Animations */
        .shuffling .shell-emoji { animation: shake 0.4s infinite alternate; }
        @keyframes shake {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-15px) rotate(-10deg); }
            50% { transform: translateX(15px) rotate(10deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        .revealed .shell-emoji { transform: translateY(-40px) scale(1.1); }
        .revealed .pearl-emoji { opacity: 1; transform: translateY(10px); }
        
        .empty-revealed .shell-emoji { transform: translateY(-30px); opacity: 0.7; filter: grayscale(100%); }

        /* End Screen */
        #end-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); z-index: 100; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen">
        <h2>මුතු ඇටය හොයමු 🦪</h2>
        <p style="color: #636e72; font-size: 14px; margin-bottom: 20px;">වට 10 යි. මුලින්ම හරියටම මුතු ඇටය තියෙන සිප්පි කටුව ඔබන කෙනා දිනුම්!</p>
        
        <p style="font-weight: bold; margin-bottom: 5px;">ඔයාගේ Game ID එක:</p>
        <div class="id-box" id="my-id">Cloud Server සම්බන්ධ වෙමින්...</div>
        
        <p style="font-weight: bold; margin-top: 15px;">හෝ අනිත් කෙනාගේ ID එක:</p>
        <input type="text" id="partner-id" placeholder="ID එක Paste කරන්න">
        <button class="btn" id="connect-btn">ගේම් එකට යමු 🚀</button>
        <p id="status-msg" style="color: #27ae60; font-size: 14px; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div class="player-zone" id="sasindi-zone">👧🏻 සසින්දි: <span id="score-sasindi">0</span></div>
        
        <div id="play-area">
            <div id="round-info">වටය <span id="round-num">1</span> / 10</div>
            
            <div id="shells-container">
                <div class="shell-wrapper" onclick="handleGuess(0)">
                    <div class="pearl-emoji" id="pearl-0">⚪</div>
                    <div class="shell-emoji" id="shell-0">🦪</div>
                </div>
                <div class="shell-wrapper" onclick="handleGuess(1)">
                    <div class="pearl-emoji" id="pearl-1">⚪</div>
                    <div class="shell-emoji" id="shell-1">🦪</div>
                </div>
                <div class="shell-wrapper" onclick="handleGuess(2)">
                    <div class="pearl-emoji" id="pearl-2">⚪</div>
                    <div class="shell-emoji" id="shell-2">🦪</div>
                </div>
            </div>

            <div id="msg-info">සිප්පි කටු මාරු වෙනවා...</div>
        </div>

        <div class="player-zone" id="sumudu-zone">👦🏻 සුමුදු: <span id="score-sumudu">0</span></div>
    </div>

    <!-- End Screen -->
    <div id="end-screen">
        <h1 id="winner-text" style="color: var(--primary); margin-bottom: 10px; font-size: 35px;">🎉</h1>
        <h2 style="color: #2d3436; margin-bottom: 20px;">තරඟය අවසන්!</h2>
        <p style="font-size: 18px; margin-bottom: 10px; font-weight: bold;">සුමුදු: <span id="final-sumudu">0</span></p>
        <p style="font-size: 18px; margin-bottom: 20px; font-weight: bold;">සසින්දි: <span id="final-sasindi">0</span></p>
        <button class="btn" onclick="location.reload()">නැවත සෙල්ලම් කරන්න</button>
    </div>

    <script>
        // --- 1. CLOUD NETWORKING (MQTT - Zero Error Architecture) ---
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let myRole = 'sumudu'; // Default host
        let gameTopic = 'pearl_hunt_' + Math.floor(Math.random() * 100000);

        const DOM = {
            setup: document.getElementById('setup-screen'),
            game: document.getElementById('game-screen'),
            status: document.getElementById('status-msg'),
            myId: document.getElementById('my-id'),
            partnerId: document.getElementById('partner-id'),
            connectBtn: document.getElementById('connect-btn'),
            scoreSumudu: document.getElementById('score-sumudu'),
            scoreSasindi: document.getElementById('score-sasindi'),
            roundNum: document.getElementById('round-num'),
            msgInfo: document.getElementById('msg-info'),
            shells: [
                document.getElementById('shell-0').parentElement,
                document.getElementById('shell-1').parentElement,
                document.getElementById('shell-2').parentElement
            ],
            endScreen: document.getElementById('end-screen'),
            winnerText: document.getElementById('winner-text'),
            finalSumudu: document.getElementById('final-sumudu'),
            finalSasindi: document.getElementById('final-sasindi')
        };

        client.on('connect', () => {
            DOM.myId.innerText = gameTopic;
            client.subscribe(gameTopic);
            DOM.status.innerText = "Cloud Server එකට සම්බන්ධයි ✅";
        });

        client.on('message', (topic, message) => {
            const msg = JSON.parse(message.toString());
            if (msg.sender === myRole) return; 
            handleNetworkData(msg.payload);
        });

        function sendNetworkData(payload) {
            client.publish(gameTopic, JSON.stringify({ sender: myRole, payload: payload }));
        }

        DOM.connectBtn.onclick = () => {
            const pid = DOM.partnerId.value.trim();
            if(!pid) return alert("කරුණාකර ID එකක් දෙන්න!");
            
            client.unsubscribe(gameTopic);
            gameTopic = pid;
            client.subscribe(gameTopic);
            
            myRole = 'sasindi';
            DOM.status.innerText = "සුමුදුට සම්බන්ධ වෙමින් පවතී...";
            sendNetworkData({ type: 'join' });
        };

        // --- 2. GAME LOGIC (Host Authoritative) ---
        let state = {
            round: 1,
            scores: { sumudu: 0, sasindi: 0 },
            phase: 'waiting', // waiting, shuffling, guessing, revealed
            pearlIndex: 0,
            winner: null // round winner
        };

        function handleNetworkData(data) {
            if (data.type === 'join' && myRole === 'sumudu') {
                DOM.status.innerText = "සසින්දි සම්බන්ධ වුණා! ගේම් එක පටන් ගන්නවා...";
                setTimeout(() => { startRound(); }, 1000);
            }
            else if (data.type === 'sync') {
                state = data.state;
                renderState();
            }
            else if (data.type === 'guess' && myRole === 'sumudu') {
                processGuess(data.player, data.index);
            }
        }

        // Host ONLY: Manage rounds
        function startRound() {
            if(state.round > 10) return endGame();
            
            state.phase = 'shuffling';
            state.pearlIndex = Math.floor(Math.random() * 3);
            state.winner = null;
            sendNetworkData({ type: 'sync', state: state });
            renderState();

            // Shuffle for 2 seconds
            setTimeout(() => {
                state.phase = 'guessing';
                sendNetworkData({ type: 'sync', state: state });
                renderState();
            }, 2000);
        }

        // Host ONLY: Process guesses
        function processGuess(player, index) {
            if (state.phase !== 'guessing') return;

            state.phase = 'revealed';
            
            if (index === state.pearlIndex) {
                // Correct guess
                state.scores[player]++;
                state.winner = player;
            } else {
                // Wrong guess! Point goes to the other player.
                let otherPlayer = player === 'sumudu' ? 'sasindi' : 'sumudu';
                state.scores[otherPlayer]++;
                state.winner = otherPlayer;
            }

            sendNetworkData({ type: 'sync', state: state });
            renderState();

            // Wait 2.5 seconds, then next round
            setTimeout(() => {
                state.round++;
                startRound();
            }, 2500);
        }

        // Both Players: Handle click
        window.handleGuess = function(index) {
            if (state.phase !== 'guessing') return;

            if (myRole === 'sumudu') {
                processGuess('sumudu', index);
            } else {
                sendNetworkData({ type: 'guess', player: 'sasindi', index: index });
            }
        };

        // --- 3. RENDER ENGINE ---
        function renderState() {
            DOM.setup.style.display = 'none';
            DOM.game.style.display = 'flex';

            DOM.roundNum.innerText = Math.min(state.round, 10);
            DOM.scoreSumudu.innerText = state.scores.sumudu;
            DOM.scoreSasindi.innerText = state.scores.sasindi;

            // Reset Shells
            DOM.shells.forEach(shell => {
                shell.classList.remove('shuffling', 'revealed', 'empty-revealed');
            });

            if (state.phase === 'shuffling') {
                DOM.msgInfo.innerText = "සිප්පි කටු මාරු වෙනවා... 👀";
                DOM.shells.forEach(shell => shell.classList.add('shuffling'));
            } 
            else if (state.phase === 'guessing') {
                DOM.msgInfo.innerText = "ඉක්මනට මුතු ඇටේ තියෙන එක ඔබන්න! 👆";
            } 
            else if (state.phase === 'revealed') {
                if (state.winner === myRole) {
                    DOM.msgInfo.innerText = "🎉 නියමයි! ඔයාට ලකුණක් හම්බුණා!";
                    DOM.msgInfo.style.color = "#ffeaa7";
                } else {
                    DOM.msgInfo.innerText = "කණගාටුයි! අනිත් කෙනා ලකුණ ගත්තා 😢";
                    DOM.msgInfo.style.color = "#ff7675";
                }

                // Show pearl
                DOM.shells.forEach((shell, idx) => {
                    if (idx === state.pearlIndex) {
                        shell.classList.add('revealed');
                    } else {
                        shell.classList.add('empty-revealed');
                    }
                });
            }
        }

        function endGame() {
            DOM.finalSumudu.innerText = state.scores.sumudu;
            DOM.finalSasindi.innerText = state.scores.sasindi;
            
            if (state.scores.sumudu > state.scores.sasindi) {
                DOM.winnerText.innerText = "🎉 සුමුදු දිනුම්!";
            } else if (state.scores.sasindi > state.scores.sumudu) {
                DOM.winnerText.innerText = "🎉 සසින්දි දිනුම්!";
            } else {
                DOM.winnerText.innerText = "🤝 තරඟය සමයි!";
            }
            
            DOM.endScreen.style.display = 'block';
        }
    </script>
</body>
</html>
